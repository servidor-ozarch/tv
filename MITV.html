<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiTV</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff96;
            --bg-dark: #050505;
            --icon-circle-bg: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow-x: hidden;
            height: 100%;
            width: 100%;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .lista-canais {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: min-content; 
            gap: 15px;
            justify-items: center;
        }

        .item {
            width: 100%;
            max-width: 90px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item:active { transform: scale(0.9); }

        .logo-container {
            width: 100px;
            height: 100px;
            background-color: var(--icon-circle-bg);
            border-radius: 10%;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1a1a1a;
            transition: all 0.2s ease;
            box-shadow: 0 4px 50px rgba(0,0,0,0.3);
        }

        .item:hover .logo-container {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.2);
        }

        .logo {
            max-width: 65%;
            max-height: 65%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .channel-name {
            font-size: 0.65rem;
            font-weight: 600;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-transform: uppercase;
        }

        #playerContainer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
        }

        #status-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            pointer-events: none;
        }

        #status-text {
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            opacity: 0; 
            transition: opacity 0.3s ease;
        }

        .video-visible { opacity: 1 !important; }

        video::-webkit-media-controls { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="lista" class="lista-canais"></div>
</div>

<div id="playerContainer">
    <div id="status-container"><div id="status-text">CARREGANDO ...</div></div>
    <video id="video" playsinline autoplay></video>
</div>

const CANAIS_BASE = [

    { id: 'cinemax', nome: 'Cinemax' }, { id: 'hbo', nome: 'HBO' }, { id: 'hbo2', nome: 'HBO 2' },
    { id: 'hbofamily', nome: 'HBO Family' }, { id: 'hbomundi', nome: 'HBO Mundi' },
    { id: 'hbopop', nome: 'HBO Pop' }, { id: 'hboplus', nome: 'HBO Plus' },

    { id: 'tcm', nome: 'TCM' }, { id: 'tnt', nome: 'TNT' }, { id: 'tntnovelas', nome: 'TNT Novelas' },
    { id: 'tntseries', nome: 'TNT Series' }, { id: 'tlc', nome: 'TLC' },
    { id: 'comedycentral', nome: 'Comedy' }, { id: 'gnt', nome: 'GNT' },
    { id: 'hgtv', nome: 'HGTV' }, { id: 'off', nome: 'OFF' },
    { id: 'foodnetwork', nome: 'Food Network' }, { id: 'mtv', nome: 'MTV' },
    { id: 'multishow', nome: 'Multishow' }, { id: 'cartoonnetwork', nome: 'Cartoon' },
    { id: 'cartoonito', nome: 'Cartoonito' }, { id: 'discoverykids', nome: 'D. Kids' },
    { id: 'gloob', nome: 'Gloob' }, { id: 'adultswim', nome: 'Adult Swim' },

    { id: 'xsports', nome: 'X Sports' }, { id: 'premiere', nome: 'Premiere' },

    { id: 'cultura', nome: 'Cultura' }

const BASE_URL_LOGOS = "https://raw.githubusercontent.com/servidor-ozarch/tv/main/live/logotipo/";
var hls;
var currentUrl = "";
var isFirstLoad = true;

const video = document.getElementById('video');
const statusText = document.getElementById('status-text');
const statusContainer = document.getElementById('status-container');
const playerContainer = document.getElementById('playerContainer');

function updateStatus(msg) {
    if(msg) {
        statusText.innerText = msg;
        statusContainer.style.display = 'flex';
    } else {
        statusContainer.style.display = 'none';
    }
}

function requestFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

function exitFullscreen() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}

function tryPlay() {
    video.play().then(() => {
       video.style.opacity = '1';
       updateStatus(null);
       isFirstLoad = false;
    }).catch(() => {});
}

function initPlayer(url) {
    currentUrl = url;
    isFirstLoad = true;
    playerContainer.style.display = "block";
    updateStatus("CARREGANDO ...");
    
    if(hls) {
        hls.stopLoad();
        hls.detachMedia();
        hls.destroy();
    }

    video.pause();
    video.removeAttribute('src');
    video.load();
    video.style.opacity = '0';

    requestFullscreen();
    history.pushState({ player: true }, '');

    if(Hls.isSupported()){
      hls = new Hls({
        autoStartLoad: true,
        maxBufferLength: 40, // Buffet agressivo
        maxMaxBufferLength: 90, 
        maxBufferSize: 90 * 1024 * 1024,
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 0,
        manifestLoadingMaxRetry: Infinity,
        levelLoadingMaxRetry: Infinity,
        fragLoadingMaxRetry: Infinity,
        appendErrorMaxRetry: 5
      });
      
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch(data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR: 
                hls.startLoad(); 
                break;
            case Hls.ErrorTypes.MEDIA_ERROR: 
                hls.recoverMediaError(); 
                break;
            default: 
                setTimeout(() => { initPlayer(currentUrl); }, 3000); 
                break;
          }
        }
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
      video.addEventListener('loadedmetadata', tryPlay);
    }
}

// MONITORAMENTO DO BUFFER 100% VAZIO
setInterval(() => {
    if (playerContainer.style.display === "block" && !isFirstLoad) {
        let isStalled = false;
        
        // Se o video está tocando mas não há buffer à frente do tempo atual
        if (!video.paused) {
            let hasBuffer = false;
            for (let i = 0; i < video.buffered.length; i++) {
                if (video.currentTime >= video.buffered.start(i) && video.currentTime <= video.buffered.end(i)) {
                    // Se o resto do buffer for quase zero (menor que 0.2s)
                    if (video.buffered.end(i) - video.currentTime > 0.2) {
                        hasBuffer = true;
                    }
                }
            }
            
            // Critério de mensagem: Vídeo travado (readyState 0 ou 1) ou Buffer esgotado
            if (video.readyState < 2 || !hasBuffer) {
                isStalled = true;
            }
        }

        if (isStalled) {
            updateStatus('RECONECTANDO ...');
        } else {
            updateStatus(null);
        }
    }
}, 500);

function fecharPlayer() {
    playerContainer.style.display = "none";
    if(hls) {
        hls.stopLoad();
        hls.destroy();
        hls = null;
    }
    video.pause();
    video.src = "";
    video.style.opacity = '0';
    exitFullscreen();
}

window.onpopstate = function(event) {
    if (playerContainer.style.display === "block") {
        fecharPlayer();
    }
};

async function fetchM3U8(id) {
    try {
        const targetUrl = `https://www5.embedtv.cv/${id}`;
        const res = await fetch(targetUrl);
        const html = await res.text();
        const match = html.match(/https?:\/\/[^\s"'<>]+\.m3u8/gi);
        return match ? match[0] : null;
    } catch (e) { return null; }
}

async function syncCannels() {
    const updatedList = await Promise.all(
        CANAIS_BASE.map(async c => {
            const url = await fetchM3U8(c.id);
            return url ? { ...c, url } : null;
        })
    );
    const filtrado = updatedList.filter(Boolean);
    if (filtrado.length > 0) {
        localStorage.setItem("iptv_cache_gh_vFinal", JSON.stringify(filtrado));
        render(filtrado);
    }
}

function render(lista) {
    const container = document.getElementById('lista');
    container.innerHTML = ""; 
    lista.forEach(item => {
        const logoUrl = `${BASE_URL_LOGOS}${LOGOS[item.id] || item.id + '.png'}`;
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div class="logo-container"><img class="logo" src="${logoUrl}"></div><div class="channel-name">${item.nome}</div>`;
        div.onclick = () => initPlayer(item.url);
        container.appendChild(div);
    });
}

window.onload = () => {
    const cache = localStorage.getItem("iptv_cache_gh_vFinal");
    if (cache) render(JSON.parse(cache));
    syncCannels();
};
</script>
