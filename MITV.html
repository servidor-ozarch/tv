<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiTV</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff96;
            --bg-dark: #050505;
            --icon-circle-bg: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .lista-canais {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: min-content; 
            gap: 15px;
            justify-items: center;
        }

        .item {
            width: 100%;
            max-width: 90px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item:active { transform: scale(0.9); }

        .logo-container {
            width: 100px;
            height: 100px;
            background-color: var(--icon-circle-bg);
            border-radius: 10%;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1a1a1a;
            transition: all 0.2s ease;
            box-shadow: 0 4px 50px rgba(0,0,0,0.3);
        }

        .item:hover .logo-container {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.2);
        }

        .logo {
            max-width: 65%;
            max-height: 65%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .channel-name {
            font-size: 0.65rem;
            font-weight: 600;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-transform: uppercase;
        }

        #playerContainer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: none;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            color: var(--primary);
            z-index: 115;
            letter-spacing: 3px;
            font-weight: 700;
            text-align: center;
            pointer-events: none;
        }

        .btn-back {
            position: absolute;
            top: 10px; 
            left: 5px;
            background: rgba(30, 30, 30, 0.8);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 8px;
            border-radius: 5px;
            z-index: 150; 
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            opacity: 0; 
            transition: opacity 0.5s ease;
        }

        .video-visible {
            opacity: 1 !important;
        }

        video::-webkit-media-controls-panel, 
        video::-webkit-media-controls-play-button, 
        video::-webkit-media-controls-start-playback-button { 
            display: none !important; 
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="lista" class="lista-canais"></div>
</div>

<div id="playerContainer">
    <div id="loader">CARREGANDO...</div>
    <div class="btn-back" onclick="fecharPlayer()">VOLTAR</div>
    <video id="video" playsinline autocomplete="off"></video>
</div>

<script>

const CANAIS_BASE = [
    { id: 'ae', nome: 'A&E' }, { id: 'amc', nome: 'AMC' }, { id: 'axn', nome: 'AXN' }, { id: 'cinemax', nome: 'Cinemax' },
    { id: 'hbo', nome: 'HBO' }, { id: 'hbo2', nome: 'HBO 2' }, { id: 'hbofamily', nome: 'HBO Family' },
    { id: 'hbomundi', nome: 'HBO Mundi' }, { id: 'hbopop', nome: 'HBO Pop' }, { id: 'hboplus', nome: 'HBO Plus' },
    { id: 'hboxtreme', nome: 'HBO Xtreme' }, { id: 'megapix', nome: 'Megapix' }, { id: 'sonychannel', nome: 'Sony Channel' },
    { id: 'space', nome: 'SPACE' }, { id: 'studiouniversal', nome: 'Studio Universal' }, { id: 'telecineaction', nome: 'Telecine Action' },
    { id: 'telecinecult', nome: 'Telecine Cult' }, { id: 'telecinefun', nome: 'Telecine Fun' }, { id: 'telecinepipoca', nome: 'Telecine Pipoca' },
    { id: 'telecinepremium', nome: 'Telecine Premium' }, { id: 'telecinetouch', nome: 'Telecine Touch' }, { id: 'universaltv', nome: 'Universal TV' },
    { id: 'warnerchannel', nome: 'Warner Channel' }, { id: 'animalplanet', nome: 'Animal Planet' }, { id: 'discoverychannel', nome: 'Discovery Channel' },
    { id: 'discoveryhh', nome: 'Discovery H&H' }, { id: 'discoveryid', nome: 'Discovery ID' }, { id: 'discoveryscience', nome: 'Discovery Science' },
    { id: 'discoverytheater', nome: 'Discovery Theater' }, { id: 'discoveryturbo', nome: 'Discovery Turbo' }, { id: 'discoveryworld', nome: 'Discovery World' },
    { id: 'fishtv', nome: 'Fish TV' }, { id: 'history', nome: 'History' }, { id: 'history2', nome: 'History 2' },
    { id: 'tcm', nome: 'TCM' }, { id: 'tnt', nome: 'TNT' }, { id: 'tntnovelas', nome: 'TNT Novelas' }, { id: 'tntseries', nome: 'TNT Series' },
    { id: 'tlc', nome: 'TLC' }, { id: 'comedycentral', nome: 'Comedy Central' }, { id: 'gnt', nome: 'GNT' }, { id: 'hgtv', nome: 'HGTV' },
    { id: 'off', nome: 'Canal OFF' }, { id: 'foodnetwork', nome: 'Food Network' }, { id: 'mtv', nome: 'MTV' }, { id: 'multishow', nome: 'Multishow' },
    { id: 'cartoonnetwork', nome: 'Cartoon Network' }, { id: 'cartoonito', nome: 'Cartoonito' }, { id: 'discoverykids', nome: 'Discovery Kids' },
    { id: 'gloob', nome: 'Gloob' }, { id: 'adultswim', nome: 'Adult Swim' }, { id: 'bandsports', nome: 'Band Sports' },
    { id: 'combate', nome: 'Combate' }, { id: 'ufcfightpass', nome: 'UFC Fight Pass' }, { id: 'premiere', nome: 'Premiere' },
    { id: 'premiere2', nome: 'Premiere 2' }, { id: 'premiere3', nome: 'Premiere 3' }, { id: 'premiere4', nome: 'Premiere 4' },
    { id: 'premiere5', nome: 'Premiere 5' }, { id: 'premiere6', nome: 'Premiere 6' }, { id: 'premiere7', nome: 'Premiere 7' },
    { id: 'premiere8', nome: 'Premiere 8' }, { id: 'espn', nome: 'ESPN' }, { id: 'espn2', nome: 'ESPN 2' }, { id: 'espn3', nome: 'ESPN 3' },
    { id: 'espn4', nome: 'ESPN 4' }, { id: 'espn5', nome: 'ESPN 5' }, { id: 'espn6', nome: 'ESPN 6' }, { id: 'sportv', nome: 'SPORTV' },
    { id: 'sportv2', nome: 'SPORTV 2' }, { id: 'sportv3', nome: 'SPORTV 3' }, { id: 'sportv4', nome: 'SPORTV 4' },
    { id: 'globorj', nome: 'Globo RJ' }, { id: 'globonews', nome: 'Globo News' }, { id: 'sbtrj', nome: 'SBT RJ' },
    { id: 'recordrj', nome: 'Record RJ' }, { id: 'bandrj', nome: 'Band RJ' }, { id: 'bandnews', nome: 'Band News' },
    { id: 'cnnbrasil', nome: 'CNN Brasil' }, { id: 'cultura', nome: 'TV Cultura' }
];

const BASE_URL_LOGOS = "https://raw.githubusercontent.com/servidor-ozarch/tv/main/live/logotipo/";
let hlsInstance = null;

async function fetchM3U8(id) {
    try {
        const proxy = "https://corsproxy.io/?"; 
        const targetUrl = `https://www5.embedtv.cv/${id}`;
        const res = await fetch(proxy + encodeURIComponent(targetUrl));
        const html = await res.text();
        const match = html.match(/https?:\/\/[^\s"'<>]+\.m3u8/gi);
        return match ? match[0] : null;
    } catch (error) {
        console.error("Erro ao buscar canal:", id, error);
        return null;
    }
}

async function syncCannels() {
    const updatedList = await Promise.all(
        CANAIS_BASE.map(async c => {
            const url = await fetchM3U8(c.id);
            return url ? { ...c, url } : null;
        })
    );
    const filtrado = updatedList.filter(Boolean);
    if (filtrado.length > 0) {
        localStorage.setItem("iptv_cache_gh_vFinal", JSON.stringify(filtrado));
        render(filtrado);
    }
}

function render(lista) {
    const container = document.getElementById('lista');
    container.innerHTML = ""; 
    lista.forEach(item => {
        const logoArquivo = LOGOS[item.id] || `${item.id}.png`;
        const logoUrl = `${BASE_URL_LOGOS}${logoArquivo}`;
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div class="logo-container"><img class="logo" src="${logoUrl}"></div><div class="channel-name">${item.nome}</div>`;
        div.onclick = () => abrirPlayer(item.url);
        container.appendChild(div);
    });
}

function abrirPlayer(url) {
    const video = document.getElementById('video');
    const container = document.getElementById('playerContainer');
    const loader = document.getElementById('loader');

    container.style.display = "block";
    loader.style.display = "block"; 
    video.className = ""; 

    if (container.requestFullscreen) {
        container.requestFullscreen();
    } else if (container.webkitRequestFullscreen) {
        container.webkitRequestFullscreen();
    }

    if (hlsInstance) hlsInstance.destroy();

    const mostrarStreaming = () => {
        video.play().then(() => {
            video.classList.add('video-visible');
            loader.style.display = "none";
        }).catch(() => {
            video.muted = true;
            video.play();
            video.classList.add('video-visible');
            loader.style.display = "none";
        });
    };

    video.onplaying = () => {
        video.classList.add('video-visible');
        loader.style.display = "none";
    };

    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, mostrarStreaming);
    } else {
        video.src = url;
        video.onloadedmetadata = mostrarStreaming;
    }
}

function fecharPlayer() {
    const video = document.getElementById('video');
    document.getElementById('playerContainer').style.display = "none";

    if (document.exitFullscreen) {
        document.exitFullscreen().catch(() => {});
    } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
    }

    video.pause();
    video.src = "";
    video.className = "";
    if (hlsInstance) hlsInstance.stopLoad();
}

window.onload = () => {
    const cache = localStorage.getItem("iptv_cache_gh_vFinal");
    if (cache) render(JSON.parse(cache));
    syncCannels();
};
</script>
