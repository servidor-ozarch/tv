<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPTV ELITE</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    background:#050505;
    font-family:Arial;
    overflow:hidden;
}

.lista-canais {
    height:100vh;
    overflow:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:10px;
    padding:10px;
}

.item {
    text-align:center;
    cursor:pointer;
}

.logo-container {
    width:90px;
    height:90px;
    background:#111;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo {
    max-width:70%;
}

#playerContainer {
    position:fixed;
    inset:0;
    background:#000;
    display:none;
}

video {
    width:100%;
    height:100%;
}

#loader {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#00ff96;
}

.btn-back {
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
</style>
</head>

<body>

<div id="lista" class="lista-canais"></div>

<div id="playerContainer">
    <div id="loader">CARREGANDO...</div>
    <button class="btn-back" onclick="fecharPlayer()">VOLTAR</button>
    <video id="video" playsinline></video>
</div>

<script>
const BASE_URL = "https://www4.embedtv.cv";
const BASE_LOGO = "https://raw.githubusercontent.com/servidor-ozarch/tv/main/live/logotipo/";

// ✅ LOGOS SEPARADO (VOLTOU)
const LOGOS = {
    globorj: "globo.png",
    sbtrj: "sbt.png",
    recordrj: "record.png",
    bandrj: "band.png",
    sportv: "sportv.png",
    espn: "espn.png",
    hbo: "hbo.png",
    tnt: "tnt.png"
};

let hls = null;
let currentUrl = null;
let cacheUrls = {};

// ================= FETCH =================
async function fetchM3U8(id) {
    try {
        const res = await fetch(`${BASE_URL}/${id}`);
        const html = await res.text();
        const match = html.match(/https?:\/\/[^\s"'<>]+\.m3u8/gi);
        return match ? match[0] : null;
    } catch {
        return null;
    }
}

// ================= PRELOAD =================
async function preload(id) {
    if (cacheUrls[id]) return;
    const url = await fetchM3U8(id);
    if (url) cacheUrls[id] = url;
}

// ================= PLAYER =================
function abrirPlayer(url) {
    const video = document.getElementById("video");
    const container = document.getElementById("playerContainer");
    const loader = document.getElementById("loader");

    container.style.display = "block";
    loader.style.display = "block";

    if (url === currentUrl) return;
    currentUrl = url;

    if (Hls.isSupported()) {
        if (!hls) {
            hls = new Hls({
                maxBufferLength: 10
            });
            hls.attachMedia(video);
        }

        hls.loadSource(url);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });

    } else {
        video.src = url;
        video.play();
    }

    video.onplaying = () => {
        loader.style.display = "none";
    };
}

// ================= LISTA =================
const canais = [
    {id:"hbo", nome:"HBO"},
    {id:"tnt", nome:"TNT"},
    {id:"espn", nome:"ESPN"},
    {id:"sportv", nome:"SPORTV"},
    {id:"globorj", nome:"GLOBO RJ"},
    {id:"sbtrj", nome:"SBT RJ"},
    {id:"recordrj", nome:"RECORD"},
    {id:"bandrj", nome:"BAND"}
];

function render() {
    const lista = document.getElementById("lista");

    canais.forEach(item => {

        // ✅ usa LOGOS ou fallback automático
        const logoFile = LOGOS[item.id] || `${item.id}.png`;
        const logoUrl = BASE_LOGO + logoFile;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="logo-container">
                <img class="logo" src="${logoUrl}">
            </div>
            <div>${item.nome}</div>
        `;

        // ✅ onclick do jeito certo
        div.onclick = async () => {
            let url = cacheUrls[item.id];

            if (!url) {
                url = await fetchM3U8(item.id);
                if (url) cacheUrls[item.id] = url;
            }

            abrirPlayer(url);
        };

        // 🔥 preload em background
        preload(item.id);

        lista.appendChild(div);
    });
}

// ================= FECHAR =================
function fecharPlayer() {
    const video = document.getElementById("video");
    document.getElementById("playerContainer").style.display = "none";
    video.pause();
}

// ================= INIT =================
window.onload = () => {
    render();
};
</script>
