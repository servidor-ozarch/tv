<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiTV</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff96;
            --bg-dark: #050505;
            --icon-circle-bg: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .lista-canais {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: min-content; 
            gap: 15px;
            justify-items: center;
        }

        .item {
            width: 100%;
            max-width: 90px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item:active { transform: scale(0.9); }

        .logo-container {
            width: 100px;
            height: 100px;
            background-color: var(--icon-circle-bg);
            border-radius: 10%;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1a1a1a;
            transition: all 0.2s ease;
            box-shadow: 0 4px 50px rgba(0,0,0,0.3);
        }

        .item:hover .logo-container {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.2);
        }

        .logo {
            max-width: 65%;
            max-height: 65%;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .channel-name {
            font-size: 0.65rem;
            font-weight: 600;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-transform: uppercase;
        }

        #playerContainer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: none;
        }

        /* NOVO ESTILO DO LOADER */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 115;
            pointer-events: none;
        }

        #loader span {
            background: #77000000;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 700;
            display: inline-block;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            opacity: 0; 
            transition: opacity 0.5s ease;
        }

        .video-visible {
            opacity: 1 !important;
        }

        video::-webkit-media-controls-panel, 
        video::-webkit-media-controls-play-button, 
        video::-webkit-media-controls-start-playback-button { 
            display: none !important; 
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="lista" class="lista-canais"></div>
</div>

<div id="playerContainer">
    <div id="loader"><span>CARREGANDO...</span></div>
    <video id="video" playsinline autocomplete="off"></video>
</div>

<script>
const LOGOS = {
    ae: 'ae.png', amc: 'amc.png', axn: 'axn.png', cinemax: 'cinemax.png',
    hbo: 'hbo.png', hbo2: 'hbo2.png', hbofamily: 'hbofamily.png', hbomundi: 'hbomundi.png',
    hbopop: 'hbopop.png', hboplus: 'hboplus.png', hboxtreme: 'hboxtreme.png', megapix: 'megapix.png',
    sonychannel: 'sonychannel.png', space: 'space.png', studiouniversal: 'studiouniversal.png',
    telecineaction: 'telecineaction.png', telecinecult: 'telecinecult.png', telecinefun: 'telecinefun.png',
    telecinepipoca: 'telecinepipoca.png', telecinepremium: 'telecinepremium.png', telecinetouch: 'telecinetouch.png',
    universaltv: 'universaltv.png', warnerchannel: 'warnerchannel.png', animalplanet: 'animalplanet.png',
    discoverychannel: 'discoverychannel.png', discoveryhh: 'discoveryhh.png', discoveryid: 'discoverychannel.png',
    discoveryscience: 'discoveryscience.png', discoverytheater: 'discoverytheater.png',
    discoveryturbo: 'discoveryturbo.png', discoveryworld: 'discoveryworld.png', fish: 'fish.png',
    history: 'history.png', history2: 'history2.png', tcm: 'tcm.png', tnt: 'tnt.png',
    tntnovelas: 'tntnovelas.png', tntseries: 'tntseries.png', tlc: 'tlc.png', comedycentral: 'comedycentral.png',
    gnt: 'gnt.png', hgtv: 'hgtv.png', off: 'off.png', foodnetwork: 'foodnetwork.png', mtv: 'mtv.png',
    multishow: 'multishow.png', cartoonnetwork: 'cartoonnetwork.png', cartoonito: 'cartoonito.png',
    discoverykids: 'discoverykids.png', gloob: 'gloob.png', adultswim: 'adultswim.png',
    bandsports: 'bandsports.png', combate: 'combate.png', getv: 'getv.png', ufcfightpass: 'ufcfightpass.png',
    xsports: 'xsports.png', premiere: 'premiere.png', premiere2: 'premiere.png', premiere3: 'premiere.png',
    premiere4: 'premiere.png', premiere5: 'premiere.png', premiere6: 'premiere.png', premiere7: 'premiere.png',
    premiere8: 'premiere.png', espn: 'espn.png', espn2: 'espn.png', espn3: 'espn.png', espn4: 'espn.png',
    espn5: 'espn.png', espn6: 'espn.png', sportv: 'sportv.png', sportv2: 'sportv.png', sportv3: 'sportv.png',
    sportv4: 'sportv.png', globorj: 'globo.png', globonews: 'globonews.png', sbtrj: 'sbt.png',
    recordrj: 'record.png', bandrj: 'band.png', bandnews: 'bandnews.png', cnnbrasil: 'cnnbrasil.png', cultura: 'cultura.png'
};

const CANAIS_BASE = [ /* mantido exatamente igual */ ];

const BASE_URL_LOGOS = "https://raw.githubusercontent.com/servidor-ozarch/tv/main/live/logotipo/";
let hlsInstance = null;

async function fetchM3U8(id) {
    try {
        const proxy = "https://corsproxy.io/?"; 
        const targetUrl = `https://www5.embedtv.cv/${id}`;
        const res = await fetch(proxy + encodeURIComponent(targetUrl));
        const html = await res.text();
        const match = html.match(/https?:\/\/[^\s"'<>]+\.m3u8/gi);
        return match ? match[0] : null;
    } catch (error) {
        console.error("Erro ao buscar canal:", id, error);
        return null;
    }
}

async function syncCannels() {
    const updatedList = await Promise.all(
        CANAIS_BASE.map(async c => {
            const url = await fetchM3U8(c.id);
            return url ? { ...c, url } : null;
        })
    );
    const filtrado = updatedList.filter(Boolean);
    if (filtrado.length > 0) {
        localStorage.setItem("iptv_cache_gh_vFinal", JSON.stringify(filtrado));
        render(filtrado);
    }
}

function render(lista) {
    const container = document.getElementById('lista');
    container.innerHTML = ""; 
    lista.forEach(item => {
        const logoArquivo = LOGOS[item.id] || `${item.id}.png`;
        const logoUrl = `${BASE_URL_LOGOS}${logoArquivo}`;
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div class="logo-container"><img class="logo" src="${logoUrl}"></div><div class="channel-name">${item.nome}</div>`;
        div.onclick = () => abrirPlayer(item.url);
        container.appendChild(div);
    });
}

function setLoader(texto){
    const loader = document.getElementById('loader');
    loader.style.display = "block";
    loader.querySelector("span").innerText = texto;
}

function abrirPlayer(url) {
    const video = document.getElementById('video');
    const container = document.getElementById('playerContainer');

    container.style.display = "block";
    setLoader("CARREGANDO...");
    video.className = ""; 

    if (hlsInstance) hlsInstance.destroy();

    const mostrarStreaming = () => {
        video.play().then(() => {
            video.classList.add('video-visible');
            document.getElementById('loader').style.display = "none";
        }).catch(() => {
            video.muted = true;
            video.play();
            video.classList.add('video-visible');
            document.getElementById('loader').style.display = "none";
        });
    };

    video.onwaiting = () => setLoader("RECONECTANDO...");
    video.onplaying = () => {
        video.classList.add('video-visible');
        document.getElementById('loader').style.display = "none";
    };

    if (Hls.isSupported()) {
        hlsInstance = new Hls({
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            liveSyncDuration: 10,
            liveMaxLatencyDuration: 30
        });

        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, mostrarStreaming);

        hlsInstance.on(Hls.Events.ERROR, () => setLoader("RECONECTANDO..."));

    } else {
        video.src = url;
        video.onloadedmetadata = mostrarStreaming;
    }
}

function fecharPlayer() {
    const video = document.getElementById('video');
    document.getElementById('playerContainer').style.display = "none";

    video.pause();
    video.src = "";
    video.className = "";
    if (hlsInstance) hlsInstance.stopLoad();
}

window.onload = () => {
    const cache = localStorage.getItem("iptv_cache_gh_vFinal");
    if (cache) render(JSON.parse(cache));
    syncCannels();
};
</script>

</body>
</html>
