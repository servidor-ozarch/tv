<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista IPTV</title>
</head>
<body>

<script>

const canais = [
'cinemax','globo','amc','hbo','combate',
'adultswim','agromais','ae','premiere'
];

async function gerarLista() {

let lista = "#EXTM3U\n";

for (let nomeCanal of canais) {

    try {

        const api = "https://api.reidoscanais.ooo/search?q=" + encodeURIComponent(nomeCanal);

        const response = await fetch(api);
        const json = await response.json();

        if(json.success && json.data && json.data.channels.length > 0){

            json.data.channels.forEach(channel => {

                lista += `#EXTINF:-1 tvg-id="${channel.id}" tvg-logo="${channel.logo_url}" group-title="${channel.category}",${channel.name}\n`;

                lista += channel.embed_url + "\n";

            });

        }

    } catch(e){
        console.log("erro", e);
    }

}

// substitui a página inteira pelo M3U final
document.body.innerText = lista;

}

gerarLista();

</script>

</body>
</html>
