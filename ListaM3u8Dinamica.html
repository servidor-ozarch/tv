<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Dinâmica M3U</title>
<script>
const canais = ['cinemax','globo','amc','hbo','combate','adultswim','agromais','ae','premiere'];

async function gerarListaCompleta() {
    let m3uContent = "#EXTM3U\n"; // inicia o M3U

    // percorre todos os canais
    for (let nomeCanal of canais) {
        const apiURL = `https://api.reidoscanais.ooo/search?q=${encodeURIComponent(nomeCanal)}`;
        try {
            const response = await fetch(apiURL);
            const data = await response.json();

            if(data.success && data.data && data.data.channels.length > 0) {
                data.data.channels.forEach(channel => {
                    m3uContent += `#EXTINF:-1 tvg-id="${channel.id}" tvg-logo="${channel.logo_url}" group-title="${channel.category}",${channel.name}\n`;
                    m3uContent += `${channel.embed_url}\n`;
                });
            } else {
                console.log(`Canal não encontrado: ${nomeCanal}`);
            }
        } catch (err) {
            console.error(`Erro ao buscar canal ${nomeCanal}:`, err);
        }
    }

    // só depois de ter toda a lista, imprime de uma vez
    document.body.innerText = m3uContent; // texto puro, compatível com IPTV
}

// executa tudo antes de mostrar
gerarListaCompleta();
</script>
</head>
<body>
</body>
</html>
