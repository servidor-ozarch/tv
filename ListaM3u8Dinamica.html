<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script>
// força navegador a tratar como arquivo M3U
document.write("#EXTM3U\n");

// Lista de canais
const canais = [
'cinemax','globo','amc','hbo','combate',
'adultswim','agromais','ae','premiere'
];

async function gerarLista() {

for (let nomeCanal of canais) {

    const api = "https://api.reidoscanais.ooo/search?q=" + encodeURIComponent(nomeCanal);

    try {

        const resposta = await fetch(api);
        const json = await resposta.json();

        if(json.success && json.data && json.data.channels.length > 0){

            json.data.channels.forEach(canal => {

                const linha1 =
`#EXTINF:-1 tvg-id="${canal.id}" tvg-logo="${canal.logo_url}" group-title="${canal.category}",${canal.name}`;

                const linha2 = canal.embed_url;

                document.write(linha1 + "\n");
                document.write(linha2 + "\n");

            });

        }

    } catch(e){}

}

}

gerarLista();

</script>
</head>
<body>
</body>
</html>
