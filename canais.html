<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador M3U Estático</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; line-height: 1.5; }
        .status { color: #fff; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="status" id="status">🔄 Inicializando extração de canais...</div>
<pre id="output">#EXTM3U</pre>

<script>
// ==============================
// ⚙️ CONFIGURAÇÕES
// ==============================
const BASE_URL = 'https://www5.embedtv.cv';
const PROXY = 'https://api.allorigins.win/raw?url='; // Proxy para burlar CORS

const CANAIS = [
    { id: 'ae', nome: 'A&E' }, { id: 'amc', nome: 'AMC' }, { id: 'axn', nome: 'AXN' },
    { id: 'cinemax', nome: 'Cinemax' }, { id: 'hbo', nome: 'HBO' }, { id: 'hbo2', nome: 'HBO 2' },
    { id: 'hbofamily', nome: 'HBO Family' }, { id: 'hbomundi', nome: 'HBO Mundi' },
    { id: 'hbopop', nome: 'HBO Pop' }, { id: 'hboplus', nome: 'HBO Plus' },
    { id: 'hboxtreme', nome: 'HBO Xtreme' }, { id: 'megapix', nome: 'Megapix' },
    { id: 'sonychannel', nome: 'Sony Channel' }, { id: 'space', nome: 'SPACE' },
    { id: 'studiouniversal', nome: 'Studio Universal' }, { id: 'telecineaction', nome: 'Telecine Action' },
    { id: 'telecinecult', nome: 'Telecine Cult' }, { id: 'telecinefun', nome: 'Telecine Fun' },
    { id: 'telecinepipoca', nome: 'Telecine Pipoca' }, { id: 'telecinepremium', nome: 'Telecine Premium' },
    { id: 'telecinetouch', nome: 'Telecine Touch' }, { id: 'universaltv', nome: 'Universal TV' },
    { id: 'warnerchannel', nome: 'Warner Channel' }, { id: 'animalplanet', nome: 'Animal Planet' },
    { id: 'discoverychannel', nome: 'Discovery Channel' }, { id: 'discoveryhh', nome: 'Discovery H&H' },
    { id: 'discoveryid', nome: 'Discovery ID' }, { id: 'discoveryscience', nome: 'Discovery Science' },
    { id: 'discoverytheater', nome: 'Discovery Theater' }, { id: 'discoveryturbo', nome: 'Discovery Turbo' },
    { id: 'discoveryworld', nome: 'Discovery World' }, { id: 'fishtv', nome: 'Fish TV' },
    { id: 'history', nome: 'History' }, { id: 'history2', nome: 'History 2' },
    { id: 'tcm', nome: 'TCM' }, { id: 'tnt', nome: 'TNT' }, { id: 'tntnovelas', nome: 'TNT Novelas' },
    { id: 'tntseries', nome: 'TNT Series' }, { id: 'tlc', nome: 'TLC' },
    { id: 'comedycentral', nome: 'Comedy Central' }, { id: 'gnt', nome: 'GNT' },
    { id: 'hgtv', nome: 'HGTV' }, { id: 'off', nome: 'Canal OFF' },
    { id: 'foodnetwork', nome: 'Food Network' }, { id: 'mtv', nome: 'MTV' },
    { id: 'multishow', nome: 'Multishow' }, { id: 'cartoonnetwork', nome: 'Cartoon Network' },
    { id: 'cartoonito', nome: 'Cartoonito' }, { id: 'discoverykids', nome: 'Discovery Kids' },
    { id: 'gloob', nome: 'Gloob' }, { id: 'adultswim', nome: 'Adult Swim' },
    { id: 'bandsports', nome: 'Band Sports' }, { id: 'combate', nome: 'Combate' },
    { id: 'ufcfightpass', nome: 'UFC Fight Pass' }, { id: 'premiere', nome: 'Premiere' },
    { id: 'premiere2', nome: 'Premiere 2' }, { id: 'premiere3', nome: 'Premiere 3' },
    { id: 'espn', nome: 'ESPN' }, { id: 'espn2', nome: 'ESPN 2' },
    { id: 'sportv', nome: 'SPORTV' }, { id: 'globorj', nome: 'Globo RJ' }
];

// Mapeamento simplificado de logos (reaproveitando sua lógica)
const getLogo = (id) => `https://raw.githubusercontent.com/servidor-ozarch/tv/refs/heads/main/live/logotipo/${id}.png`;

// ==============================
// 🚀 LÓGICA PRINCIPAL
// ==============================
async function extrairM3U() {
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    let m3uFinal = "#EXTM3U\n";

    for (let i = 0; i < CANAIS.length; i++) {
        const canal = CANAIS[i];
        status.innerText = `🔄 Processando (${i + 1}/${CANAIS.length}): ${canal.nome}`;

        try {
            // Busca o HTML da página do canal via Proxy
            const response = await fetch(PROXY + encodeURIComponent(`${BASE_URL}/${canal.id}`));
            const html = await response.text();

            // Regex para encontrar o link m3u8
            const regex = /https?:\/\/[^\s"'<>]+\.m3u8/gi;
            const matches = html.match(regex);
            
            if (matches) {
                const streamUrl = matches.find(u => !u.includes('.js') && !u.includes('.css'));
                if (streamUrl) {
                    m3uFinal += `#EXTINF:-1 tvg-logo="${getLogo(canal.id)}",${canal.nome}\n${streamUrl}\n`;
                    // Atualiza a tela em tempo real
                    output.innerText = m3uFinal;
                }
            }
        } catch (err) {
            console.error(`Erro no canal ${canal.nome}:`, err);
        }
    }

    status.innerText = "✅ Lista gerada com sucesso! Copie o conteúdo abaixo.";
    status.style.color = "#00ff00";
}

// Iniciar ao carregar
window.onload = extrairM3U;
</script>

</body>
</html>
