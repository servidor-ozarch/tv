const PROXY = 'https://api.allorigins.win/raw?url=';

    { id: 'recordrj', nome: 'Record RJ' }, { id: 'bandrj', nome: 'Band RJ' },
    { id: 'bandnews', nome: 'Band News' }, { id: 'cnnbrasil', nome: 'CNN Brasil' },
    { id: 'cultura', nome: 'TV Cultura' }
];

async function extrairEExibir() {
    let listaAcumulada = "#EXTM3U\n";
    document.body.innerText = listaAcumulada;

    // Processa em lotes de 10 para ser rápido mas não bloquear o navegador
    for (let i = 0; i < CANAIS.length; i++) {
        const canal = CANAIS[i];
        try {
            const res = await fetch(PROXY + encodeURIComponent(`${BASE_URL}/${canal.id}`));
            const text = await res.text();
            const m = text.match(/https?:\/\/[^\s"'<>]+\.m3u8/gi);
            
            if (m) {
                const url = m.find(u => !u.includes('.js') && !u.includes('.css'));
                if (url) {
                    const logo = `https://raw.githubusercontent.com/servidor-ozarch/tv/refs/heads/main/live/logotipo/${canal.id}.png`;
                    const linha = `#EXTINF:-1 tvg-logo="${logo}",${canal.nome}\n${url}\n`;
                    listaAcumulada += linha;
                    
                    // Atualiza a tela instantaneamente canal por canal
                    document.body.innerText = listaAcumulada;
                }
            }
        } catch (e) {}
    }

    // Ao finalizar o último, dispara o download
    const blob = new Blob([listaAcumulada], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = "playlist.m3u";
    link.click();
}

window.onload = extrairEExibir;
</script></body>
</html>
